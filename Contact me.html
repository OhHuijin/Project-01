<!doctype html>
<html>
  <head>
    <title>Contact me</title>
    <link rel="stylesheet" href="Contact_me_style.css" />
    <link rel="stylesheet" href="navigation_bar.css" />
    <link rel="stylesheet" href="page_style.css" />
  </head>

  <body>
    <nav class="menu">
      <div class="nav-container">
        <a href="index.html">Home</a>
        <a href="My portfolio.html">My portfolio</a>
        <a href="My skills.html">My skills</a>
        <a href="Contact me.html">Contact me</a>
      </div>
    </nav>

    <div id="content">
      <section class="contact-card">
        <h1>Contact Me</h1>
        <p class="contact-subtitle">
          Have a question or want to connect? Leave your message below.
        </p>

        <img class="contact-icon" src="Contact_me.png" alt="Contact icon" />

        <form
          onsubmit="
            showMessage();
            return false;
          "
        >
          <div class="form-row">
            <input type="text" placeholder="Full name" name="name" />
            <input type="text" placeholder="Phone number" name="PhoneNumber" />
          </div>

          <input type="email" placeholder="Email address" name="email" />

          <textarea placeholder="Inquiry details" name="details"></textarea>

          <button type="submit">Submit</button>
        </form>
      </section>
    </div>

    <script>
      function showMessage() {
        alert(
          "Sorry, the backend is still under development! Please wait a little longer to use this feature!",
        );
      }
    </script>
  </body>
</html>
